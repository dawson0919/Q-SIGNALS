<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="60%" stop-color="#0a0604"/>
      <stop offset="100%" stop-color="#050302"/>
    </linearGradient>
    <linearGradient id="oilChart" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow orb -->
  <circle cx="950" cy="160" r="280" fill="url(#orbGlow)"/>

  <!-- Grid lines -->
  <g stroke="#3a1d0a" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Chart area fill (rising) -->
  <polygon points="50,500 150,470 250,490 350,430 450,445 550,390 650,370 750,320 850,260 950,285 1050,220 1150,180 1150,630 50,630"
    fill="url(#chartFill)"/>

  <!-- Chart line -->
  <polyline points="50,500 150,470 250,490 350,430 450,445 550,390 650,370 750,320 850,260 950,285 1050,220 1150,180"
    fill="none" stroke="url(#oilChart)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Top badge: 主推 -->
  <rect x="460" y="50" width="280" height="40" rx="20" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="600" y="77" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="18" fill="#fb923c" letter-spacing="4">主推 TOP PICK · 限時上架</text>

  <!-- Main title: CL WTI 原油 -->
  <text x="600" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="96" fill="#ffffff" letter-spacing="-2">WTI 原油期貨</text>
  <text x="600" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="64" fill="#fb923c" filter="url(#glow)" letter-spacing="4">CL / USDT</text>

  <!-- Stats row -->
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="300" y="360" text-anchor="middle" font-weight="900" font-size="44" fill="#fb923c">+39.75%</text>
    <text x="300" y="390" text-anchor="middle" font-weight="600" font-size="16" fill="#94a3b8" letter-spacing="2">策略 ROI</text>

    <text x="600" y="360" text-anchor="middle" font-weight="900" font-size="44" fill="#fb923c">83%</text>
    <text x="600" y="390" text-anchor="middle" font-weight="600" font-size="16" fill="#94a3b8" letter-spacing="2">勝率 WIN RATE</text>

    <text x="900" y="360" text-anchor="middle" font-weight="900" font-size="44" fill="#fb923c">23.2</text>
    <text x="900" y="390" text-anchor="middle" font-weight="600" font-size="16" fill="#94a3b8" letter-spacing="2">盈虧比 PF</text>
  </g>

  <!-- Divider -->
  <line x1="200" y1="435" x2="1000" y2="435" stroke="#f97316" stroke-width="1" opacity="0.25"/>

  <!-- Subtitle -->
  <text x="600" y="485" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#e2e8f0">AI 量化策略 · 即時信號 · 進階會員專享</text>

  <!-- Brand -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="42" fill="#ffffff" letter-spacing="2">QuantSignal</text>
  <text x="600" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#64748b" letter-spacing="3">q-signals-production.up.railway.app</text>

  <!-- Border -->
  <rect x="15" y="15" width="1170" height="600" rx="10" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.25"/>

  <!-- Corner accents -->
  <g stroke="#f97316" stroke-width="3" opacity="0.7">
    <line x1="15" y1="40" x2="15" y2="15"/>
    <line x1="15" y1="15" x2="40" y2="15"/>
    <line x1="1160" y1="15" x2="1185" y2="15"/>
    <line x1="1185" y1="15" x2="1185" y2="40"/>
    <line x1="1185" y1="590" x2="1185" y2="615"/>
    <line x1="1160" y1="615" x2="1185" y2="615"/>
    <line x1="15" y1="615" x2="40" y2="615"/>
    <line x1="15" y1="590" x2="15" y2="615"/>
  </g>
</svg>
